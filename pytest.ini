[pytest]
# Let tests import the package from src/ (and the backend/ package from root)
# without installing anything.
pythonpath = src .
testpaths = tests
# importlib mode lets mirrored test folders reuse file names
# (e.g. each crew having its own test_guardrail.py) without clashing.
addopts = --import-mode=importlib
markers =
    integration: live end-to-end test; needs API keys and RUN_LIVE=1 (skipped by default)
